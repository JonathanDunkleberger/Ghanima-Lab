  <path d="M29.5 43.8Q32 42.3 34.5 43.8Q34 46.4 32 46.9Q30 46.4 29.5 43.8Z" fill="#c9a8b0"/>
  <path d="M27 48.2C29 50.3 30.6 50.8 32 49.7C32.5 50.8 34 50.3 36 48.2" stroke="#7a766f" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="2.5" y1="41.5" x2="15.5" y2="43.5" stroke="#9a968f" stroke-width="0.7" opacity="0.35"/>
  <line x1="2.5" y1="47.5" x2="15.5" y2="45.5" stroke="#9a968f" stroke-width="0.7" opacity="0.35"/>
  <line x1="48.5" y1="43.5" x2="61.5" y2="41.5" stroke="#9a968f" stroke-width="0.7" opacity="0.35"/>
  <line x1="48.5" y1="45.5" x2="61.5" y2="47.5" stroke="#9a968f" stroke-width="0.7" opacity="0.35"/>
</svg>
