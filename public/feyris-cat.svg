<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Feyris mascot — Ghanima">
  <!-- Ghanima: silver chinchilla doll-face Persian. Dedicated mascot of Feyris. -->
  <defs>
    <linearGradient id="feyFur" x1="16" y1="8" x2="48" y2="58">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="40%" stop-color="#ddd9d0"/>
      <stop offset="100%" stop-color="#a8a49b"/>
    </linearGradient>
    <radialGradient id="feyIris" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#f3dfa0"/>
      <stop offset="55%" stop-color="#c8a44e"/>
      <stop offset="100%" stop-color="#7a6430"/>
    </radialGradient>
    <linearGradient id="feyGold" x1="24" y1="5" x2="40" y2="18">
      <stop offset="0%" stop-color="#f3dfa0"/>
      <stop offset="55%" stop-color="#c8a44e"/>
      <stop offset="100%" stop-color="#8a7235"/>
    </linearGradient>
    <radialGradient id="feyGem" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#b08fdc"/>
      <stop offset="100%" stop-color="#4a3270"/>
    </radialGradient>
    <radialGradient id="feyBlush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a5b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4a5b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft round backdrop for favicon clarity -->
  <circle cx="32" cy="34" r="29" fill="#0b0b10" opacity="0.0"/>

  <!-- Ears -->
  <ellipse cx="15.2" cy="19.5" rx="7.2" ry="9.2" transform="rotate(-16 15.2 19.5)" fill="url(#feyFur)"/>
  <ellipse cx="48.8" cy="19.5" rx="7.2" ry="9.2" transform="rotate(16 48.8 19.5)" fill="url(#feyFur)"/>
  <ellipse cx="15.8" cy="21.5" rx="3.1" ry="4.2" transform="rotate(-16 15.8 21.5)" fill="#d4a5b0" opacity="0.4"/>
  <ellipse cx="48.2" cy="21.5" rx="3.1" ry="4.2" transform="rotate(16 48.2 21.5)" fill="#d4a5b0" opacity="0.4"/>

  <!-- Face -->
  <ellipse cx="32" cy="38.5" rx="25.8" ry="20.8" fill="url(#feyFur)"/>
  <ellipse cx="32" cy="26.5" rx="5.2" ry="11" fill="#ffffff" opacity="0.12"/>
  <ellipse cx="32" cy="45" rx="15.5" ry="11" fill="#ffffff" opacity="0.14"/>
  <circle cx="13" cy="45" r="5" fill="url(#feyBlush)"/>
  <circle cx="51" cy="45" r="5" fill="url(#feyBlush)"/>

  <!-- Crown -->
  <path d="M23.8 18.2 L26.8 8.2 L30 14.6 L32 5.5 L34 14.6 L37.2 8.2 L40.2 18.2 Z" fill="url(#feyGold)"/>
  <ellipse cx="32" cy="11" rx="2.2" ry="2.8" fill="url(#feyGem)"/>
  <circle cx="31.2" cy="9.9" r="0.55" fill="#fff" opacity="0.85"/>
  <path d="M26.2 13L27.5 11L28.8 13L27.5 15Z" fill="url(#feyGem)"/>
  <path d="M35.2 13L36.5 11L37.8 13L36.5 15Z" fill="url(#feyGem)"/>

  <!-- Eyes -->
  <ellipse cx="21" cy="37.2" rx="6.8" ry="7.2" fill="url(#feyIris)"/>
  <ellipse cx="43" cy="37.2" rx="6.8" ry="7.2" fill="url(#feyIris)"/>
  <circle cx="21" cy="38.3" r="3.4" fill="#0b0b10"/>
  <circle cx="43" cy="38.3" r="3.4" fill="#0b0b10"/>
  <circle cx="19.1" cy="35.6" r="1.55" fill="#fff"/>
  <circle cx="41.1" cy="35.6" r="1.55" fill="#fff"/>
  <circle cx="23.1" cy="40" r="0.7" fill="#fff" opacity="0.55"/>
  <circle cx="45.1" cy="40" r="0.7" fill="#fff" opacity="0.55"/>
  <path d="M14.8 33.2C17.4 30.6 24.6 30.6 27.2 33.2" stroke="#4a4a52" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M36.8 33.2C39.4 30.6 46.6 30.6 49.2 33.2" stroke="#4a4a52" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>

